name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: nazonazo/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: nazonazo
        run: pnpm install --frozen-lockfile
      - name: Test
        working-directory: nazonazo
        run: pnpm test
      - name: Install browser
        working-directory: nazonazo
        run: pnpm exec playwright install --with-deps chromium
      - name: Browser test
        working-directory: nazonazo
        run: pnpm test:e2e
      - name: Build
        working-directory: nazonazo
        run: pnpm build

      - name: Assemble site
        run: |
          mkdir -p _site/nazonazo
          cp index.html CNAME _site/
          cp -R typing_cheat _site/
          cp -R nazonazo/dist/. _site/nazonazo/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
