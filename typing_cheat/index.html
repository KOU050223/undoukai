<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neon Typing Auto ブックマークレット</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #181b20;
      --text: #f2f5f7;
      --muted: #aab4bf;
      --line: #2a3038;
      --accent: #2dd4bf;
      --accent-ink: #05221f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary,
    a.button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
      font-weight: 700;
    }

    .status {
      min-height: 24px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .bookmark-guide {
      margin: 0 0 16px;
      padding: 12px 14px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: rgba(45, 212, 191, .08);
      color: var(--text);
    }

    .bookmark-guide ol {
      margin: 8px 0 0;
      padding-left: 22px;
    }

    @media (max-width: 720px) {
      header {
        display: block;
      }

      .actions {
        justify-content: flex-start;
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Neon Typing Auto</h1>
        <div class="status">https://otonasi-muonn.github.io/typing_game/</div>
        <p>拡張機能・貼り付け作業なしで使えるブックマークレット</p>
      </div>
      <div class="actions">
        <a
          id="bookmark-add"
          class="button primary"
          href="#bookmark-help"
          draggable="false"
          aria-controls="bookmark-help"
          title="ブックマークバーへドラッグ"
        >★ 平均180をブックマークに追加</a>
        <a class="button" href="https://otonasi-muonn.github.io/typing_game/" target="_blank" rel="noopener">ゲームを開く</a>
        <a class="button" href="https://github.com/KOU050223/undoukai/blob/main/typing_cheat/neon_typing_bookmarklet.js">GitHub</a>
      </div>
    </header>

    <div id="bookmark-help" class="bookmark-guide">
      <strong>使い方</strong>
      <ol>
        <li>「準備OK」と表示されたら、「★ 平均180をブックマークに追加」をブックマークバーへドラッグ</li>
        <li>「ゲームを開く」をクリック</li>
        <li>ゲーム画面で、追加した「★ 平均180をブックマークに追加」をクリック</li>
      </ol>
      <p>ブックマークバーが見えない場合、Chromeでは ⌘⇧B で表示できます。</p>
    </div>
    <div id="status" class="status">ブックマークを準備中...</div>
  </main>

  <script>
    const scriptPath = './neon_typing_bookmarklet.js';
    const statusEl = document.getElementById('status');
    const bookmarkLink = document.getElementById('bookmark-add');
    const bookmarkHelp = document.getElementById('bookmark-help');

    async function prepareBookmarklet() {
      try {
        const response = await fetch(scriptPath, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const source = (await response.text()).replace(/\s+/g, ' ').trim();
        bookmarkLink.href = `javascript:${source}`;
        bookmarkLink.draggable = true;
        statusEl.textContent = '準備OK：緑のボタンをブックマークバーへドラッグしてください';
      } catch {
        statusEl.textContent = 'ブックマークの準備に失敗しました。ページを再読み込みしてください。';
      }
    }

    bookmarkLink.addEventListener('click', (event) => {
      event.preventDefault();
      bookmarkHelp.scrollIntoView({ behavior: 'smooth', block: 'center' });
      statusEl.textContent = 'クリックではなく、緑のボタンをブックマークバーへドラッグしてください';
    });

    prepareBookmarklet();
  </script>
</body>
</html>
