<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neon Typing Auto userscript</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #181b20;
      --text: #f2f5f7;
      --muted: #aab4bf;
      --line: #2a3038;
      --accent: #2dd4bf;
      --accent-ink: #05221f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
      font-weight: 700;
    }

    .status {
      min-height: 24px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
    }

    pre {
      min-height: 60vh;
      margin: 0;
      padding: 18px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b0d10;
      color: #d9fff9;
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      tab-size: 2;
      white-space: pre;
    }

    @media (max-width: 720px) {
      header {
        display: block;
      }

      .actions {
        justify-content: flex-start;
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Neon Typing Auto</h1>
        <div class="status">https://otonasi-muonn.github.io/typing_game/</div>
        <p>Tampermonkey に貼り付ける userscript</p>
      </div>
      <div class="actions">
        <button id="copy" class="primary" type="button">コピー</button>
        <a class="button" href="./neon_typing_auto.user.js">直接開く</a>
        <a class="button" href="https://github.com/KOU050223/undoukai/blob/main/typing_cheat/neon_typing_auto.user.js">GitHub</a>
      </div>
    </header>

    <div id="status" class="status">読み込み中...</div>
    <pre id="code" aria-label="neon_typing_auto.user.js"></pre>
  </main>

  <script>
    const scriptPath = './neon_typing_auto.user.js';
    const codeEl = document.getElementById('code');
    const statusEl = document.getElementById('status');
    const copyBtn = document.getElementById('copy');
    let source = '';

    async function loadSource() {
      try {
        const response = await fetch(scriptPath, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        source = await response.text();
        codeEl.textContent = source;
        statusEl.textContent = `${scriptPath} を表示中`;
      } catch (error) {
        statusEl.textContent = '読み込みに失敗しました。「直接開く」から開いてください。';
        codeEl.textContent = String(error);
      }
    }

    copyBtn.addEventListener('click', async () => {
      if (!source) return;
      try {
        await navigator.clipboard.writeText(source);
        statusEl.textContent = 'コピーしました';
      } catch {
        statusEl.textContent = 'コピーできませんでした。コードを選択してコピーしてください。';
      }
    });

    loadSource();
  </script>
</body>
</html>
